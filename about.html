<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>About Me - Portfolio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/objective-section.css">
    <link rel="stylesheet" href="css/theme-toggle.css">
</head>
<body>
    <button class="theme-toggle theme-toggle--floating" type="button" data-theme-toggle aria-pressed="false" aria-label="Switch to white theme">
        <span class="theme-toggle__label theme-toggle__label--default">Default</span>
        <span class="theme-toggle__track" aria-hidden="true">
            <span class="theme-toggle__thumb"></span>
        </span>
        <span class="theme-toggle__label theme-toggle__label--light">White</span>
    </button>
    <div class="portfolio-app">
        <main>
            <!-- Objective Section -->
            <section id="objective" class="objective-section">
                <div class="objective-container">
                    <div class="objective-header animate-in">
                        <div class="objective-title">
                            <i class="fas fa-bullseye objective-icon"></i>
                            <h2>Professional Direction</h2>
                        </div>
                    </div>

                    <div class="objective-content animate-in">
                        <p class="objective-text">
                            Aspiring Data Analyst and MERN developer with a growing body of work across analytics,
                            dashboards, and user-focused web applications. I am focused on building solutions that are
                            thoughtful in execution, clear in communication, and useful in real-world decision-making.
                        </p>
                    </div>
                </div>
            </section>
        </main>
    </div>
    <script src="js/theme-toggle.js"></script>
</body>
</html>
